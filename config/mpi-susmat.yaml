# Per-trip folder convention (relative to the trip folder):
ordnerstruktur:
  - 1_Invitation/       # invitation, programme snapshot, URL reference
  - 2_Application/      # Dienstreiseantrag_<trip>.docx (+ A1 if EU)
  - 3_Booking/          # confirmations, comparison offer if needed
  - receipts/           # photos / scans from the iPhone
  - 5_Expense_Report/   # Reiseabrechnung_<trip>.docx
  - 6_Followup/         # money receipt, tax documents

# Language settings
sprache:
  interaktion: en                # agent always replies in English
  user_input_akzeptiert: [de, en]  # user may write in German or English
  dokumente_default: de          # default for filling MPIE forms; asked once per session
